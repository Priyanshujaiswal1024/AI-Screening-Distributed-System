apiVersion: v1
kind: ConfigMap
metadata:
  name: services-config
  namespace: talent-platform
data:
  POSTGRES_URL: "jdbc:postgresql://postgres:5432/talent_db"
  REDIS_HOST: "redis"
  REDIS_PORT: "6379"
  KAFKA_SERVERS: "kafka:9092"
---
# 1. Authentication Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authentication-service
  namespace: talent-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: authentication-service
  template:
    metadata:
      labels:
        app: authentication-service
    spec:
      containers:
        - name: authentication-service
          image: talent-platform/authentication-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8081
---
apiVersion: v1
kind: Service
metadata:
  name: authentication-service
  namespace: talent-platform
spec:
  ports:
    - port: 8081
  selector:
    app: authentication-service
---
# 2. User Management Service
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-management-service
  namespace: talent-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-management-service
  template:
    metadata:
      labels:
        app: user-management-service
    spec:
      containers:
        - name: user-management-service
          image: talent-platform/user-management-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8082
          env:
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: services-config
                  key: POSTGRES_URL
---
apiVersion: v1
kind: Service
metadata:
  name: user-management-service
  namespace: talent-platform
spec:
  ports:
    - port: 8082
  selector:
    app: user-management-service
---
