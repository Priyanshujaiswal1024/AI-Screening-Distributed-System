server:
  port: 8075

spring:
  application:
    name: ai-screening-service

  datasource:
    url: jdbc:postgresql://localhost:5435/screening_db
    username: postgres
    password: "2401301024"
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    bootstrap-servers: localhost:9092

    consumer:
      group-id: ai-screening-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        # CRITICAL FIX: do NOT set default.type to a class — consumer methods declare Map<String,Object>
        # Spring Kafka infers the target type from the @KafkaListener method signature.
        # Setting default.type to ResumeUploadedEvent caused MismatchedInputException
        # on every message → 3 retries → DLT → pipeline never progressed to SCREENED.
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false
        spring.json.value.default.type: java.util.LinkedHashMap

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer

  cloud:
    openfeign:
      circuitbreaker:
        enabled: true

  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        enabled: false # Disabled Chat in Ollama, using Groq instead
        model: qwen2.5:1.5b
      embedding:
        enabled: true
        model: nomic-embed-text

    openai:
      base-url: https://api.groq.com/openai/v1
      api-key: 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
      chat:
        enabled: true
        options:
          model: llama-3.1-8b-instant
      embedding:
        enabled: false # Do not use OpenAI for embeddings (keeps it free via Ollama)

    vectorstore:
      pgvector:
        dimension: 768
        distance-type: COSINE_DISTANCE
        initialize-schema: true

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,circuitbreakers
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

resilience4j:
  circuitbreaker:
    configs:
      default:
        slidingWindowType: COUNT_BASED
        slidingWindowSize: 5
        minimumNumberOfCalls: 5
        failureRateThreshold: 100
        waitDurationInOpenState: 30s
        permittedNumberOfCallsInHalfOpenState: 1
        automaticTransitionFromOpenToHalfOpenEnabled: true
        registerHealthIndicator: true
    instances:
      resume-management-service:
        baseConfig: default
  retry:
    configs:
      default:
        maxAttempts: 3
        waitDuration: 1s
        enableExponentialBackoff: true
        exponentialBackoffMultiplier: 2
    instances:
      resume-management-service:
        baseConfig: default
  timelimiter:
    configs:
      default:
        timeoutDuration: 5s
    instances:
      resume-management-service:
        timeoutDuration: 5s

aws:
  s3:
    bucket: talent-intelligence-resumes-2026
    region: eu-north-1
    access-key: AKIARWG53UC5HMAGAQ5V
    secret-key: 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