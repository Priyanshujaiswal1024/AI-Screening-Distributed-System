server:
  port: 8073

spring:
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 500MB

  application:
    name: resume-management-service

  datasource:
    url: jdbc:postgresql://localhost:5435/resume_db
    username: postgres
    password: "2401301024"
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}

    consumer:
      group-id: resume-management-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        # ↓ THE KEY FIX — ignore type headers from producer, deserialize to Map
        spring.json.use.type.headers: false
        spring.json.trusted.packages: "*"
        # Target type for all consumers that declare Map<String,Object>
        # (Spring Kafka infers the type from the @KafkaListener method signature,
        #  so this is only needed if you use a generic listener container factory)
        spring.json.value.default.type: java.util.LinkedHashMap

    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        # Don't add type headers on our outgoing messages either
        spring.json.add.type.headers: false
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
    prometheus:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

aws:
